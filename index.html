                                        className="w-full bg-zinc-950 border border-zinc-800/80 rounded-xl px-4 py-2.5 text-sm text-white placeholder-zinc-600 focus:outline-none focus:border-rose-600 focus:ring-1 focus:ring-rose-600 transition"
                                    ></textarea>
                                </div>

                                <div>
                                    <label className="text-xs font-bold uppercase tracking-wider text-zinc-400 block mb-1">Pedir una Canción (Opcional)</label>
                                    <div className="relative">
                                        <span className="absolute left-3.5 top-3 text-zinc-500 text-sm"><i className="fas fa-music"></i></span>
                                        <input 
                                            type="text" 
                                            value={songRequest}
                                            onChange={(e) => setSongRequest(e.target.value)}
                                            placeholder="Artista - Nombre del tema" 
                                            maxLength="50"
                                            className="w-full bg-zinc-950 border border-zinc-800/80 rounded-xl pl-10 pr-4 py-2.5 text-sm text-white placeholder-zinc-600 focus:outline-none focus:border-rose-600 focus:ring-1 focus:ring-rose-600 transition"
                                        />
                                    </div>
                                </div>

                                <button 
                                    type="submit" 
                                    disabled={isSubmitting}
                                    className="w-full bg-rose-600 hover:bg-rose-700 disabled:bg-zinc-800 text-white py-3 rounded-xl text-sm font-bold tracking-wider transition-all transform hover:scale-[1.01] shadow-lg shadow-rose-600/10 flex items-center justify-center gap-2"
                                >
                                    {isSubmitting ? (
                                        <>
                                            <i className="fas fa-spinner animate-spin"></i>
                                            <span>Enviando saludo...</span>
                                        </>
                                    ) : (
                                        <>
                                            <i className="fas fa-paper-plane"></i>
                                            <span>Enviar Saludo al Aire</span>
                                        </>
                                    )}
                                </button>
                            </form>
                        </div>

                        {/* Right Column: Comments board scroll list */}
                        <div className="lg:col-span-7 flex flex-col h-[520px] bg-zinc-950 border border-zinc-900 rounded-2xl overflow-hidden shadow-2xl">
                            
                            {/* Board Header */}
                            <div className="bg-zinc-900 px-6 py-4 border-b border-zinc-800 flex items-center justify-between">
                                <div className="flex items-center gap-2">
                                    <span className="w-2.5 h-2.5 rounded-full bg-emerald-500 animate-ping"></span>
                                    <span className="font-bold text-white text-sm">Pizarra Digital en Vivo</span>
                                </div>
                                <span className="text-xs text-zinc-400 font-semibold">{comments.length} Mensajes</span>
                            </div>

                            {/* Message List */}
                            <div className="flex-1 overflow-y-auto p-6 space-y-4">
                                {comments.length === 0 ? (
                                    <div className="h-full flex flex-col items-center justify-center text-center p-6 space-y-3">
                                        <div className="w-12 h-12 rounded-full bg-zinc-900 flex items-center justify-center text-zinc-500 text-xl border border-zinc-850">
                                            <i className="far fa-comments"></i>
                                        </div>
                                        <div>
                                            <h4 className="text-white font-bold text-sm">No hay mensajes recientes</h4>
                                            <p className="text-xs text-zinc-500 mt-1">¡Sé el primero en saludar a Oscar Estéreo!</p>
                                        </div>
                                    </div>
                                ) : (
                                    comments.map((c) => (
                                        <div key={c.id} className="bg-zinc-900/50 border border-zinc-800/60 p-4 rounded-xl flex items-start gap-3.5 hover:bg-zinc-900 transition">
                                            
                                            {/* Avatar element */}
                                            <div className="w-9 h-9 rounded-full bg-rose-600/10 border border-rose-500/20 flex items-center justify-center text-rose-500 font-bold font-display text-sm flex-shrink-0">
                                                {c.author.substring(0, 1).toUpperCase()}
                                            </div>

                                            {/* Text body */}
                                            <div className="flex-1 min-w-0">
                                                <div className="flex items-center justify-between gap-2 mb-1">
                                                    <h4 className="text-sm font-extrabold text-white truncate">{c.author}</h4>
                                                    <span className="text-[10px] text-zinc-500 font-medium whitespace-nowrap">
                                                        {new Date(c.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}
                                                    </span>
                                                </div>
                                                <p className="text-xs text-zinc-300 leading-relaxed break-words">{c.text}</p>
                                                
                                                {/* Song request highlight pill */}
                                                {c.request && (
                                                    <div className="inline-flex items-center gap-1.5 bg-rose-600/10 text-rose-400 border border-rose-500/10 px-2 py-0.5 rounded-md text-[10px] font-bold mt-2">
                                                        <i className="fas fa-compact-disc animate-spin" style={{ animationDuration: '3s' }}></i>
                                                            <span className="uppercase tracking-wider">Petición:</span>
                                                            <span className="text-zinc-200">{c.request}</span>
                                                        </div>
                                                    )}
                                                </div>

                                            </div>
                                        ))
                                    )}
                                </div>
                            </div>

                        </section>

                        {/* Botón de Contacto Comercial - Ventas */}
                        <section className="max-w-7xl mx-auto px-4 md:px-8 pb-12">
                            <div className="bg-gradient-to-br from-zinc-900 via-zinc-900 to-brand-900/20 border border-brand-border rounded-2xl p-6 md:p-8 flex flex-col md:flex-row items-center justify-between gap-6">
                                <div className="flex items-start gap-4 flex-1">
                                    <div className="w-12 h-12 rounded-xl bg-brand-600/10 border border-brand-500/20 flex items-center justify-center text-brand-500 text-xl shrink-0">
                                        <i className="fa-solid fa-bullhorn"></i>
                                    </div>
                                    <div>
                                        <h3 className="text-lg md:text-xl font-extrabold text-white">¿Eres anunciante o representante comercial?</h3>
                                        <p className="text-sm text-zinc-400 mt-1 leading-relaxed">Solicita una cotización para pautar en Oscar Estéreo 88.1 FM. Te respondemos en menos de 24 horas con un plan personalizado para tu marca.</p>
                                    </div>
                                </div>
                                <button onClick={() => setShowSalesModal(true)} className="bg-brand-600 hover:bg-brand-700 text-white font-bold text-sm px-6 py-3 rounded-xl transition-all shadow-lg shadow-rose-600/20 flex items-center gap-2 shrink-0">
                                    <i className="fa-solid fa-envelope-open-text"></i> Formulario de Contacto para Ventas
                                </button>
                            </div>
                        </section>

                        {/* Modal: Formulario de Ventas */}
                        {showSalesModal && (
                            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm">
                                <div className="bg-brand-card border border-brand-border w-full max-w-2xl rounded-2xl overflow-hidden shadow-2xl max-h-[90vh] overflow-y-auto">
                                    <div className="px-6 py-4 border-b border-brand-border flex items-center justify-between sticky top-0 bg-brand-card z-10">
                                        <h4 className="font-bold text-white text-sm flex items-center gap-2">
                                            <i className="fa-solid fa-bullhorn text-brand-500"></i> Formulario de Contacto — Ventas
                                        </h4>
                                        <button onClick={() => setShowSalesModal(false)} className="text-zinc-500 hover:text-white p-1"><i className="fa-solid fa-xmark text-lg"></i></button>
                                    </div>
                                    <form onSubmit={handleSubmitSales} className="p-6 space-y-4">
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            <div className="space-y-1.5">
                                                <label className="block text-xs font-bold text-zinc-300 uppercase tracking-wider">Nombre completo *</label>
                                                <input type="text" id="sales-name" required className="block w-full px-4 py-2.5 bg-zinc-900 border border-brand-border rounded-xl focus:outline-none focus:ring-2 focus:ring-brand-500 text-sm text-white" placeholder="Tu nombre" />
                                            </div>
                                            <div className="space-y-1.5">
                                                <label className="block text-xs font-bold text-zinc-300 uppercase tracking-wider">Empresa / Marca *</label>
                                                <input type="text" id="sales-company" required className="block w-full px-4 py-2.5 bg-zinc-900 border border-brand-border rounded-xl focus:outline-none focus:ring-2 focus:ring-brand-500 text-sm text-white" placeholder="Tu empresa" />
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            <div className="space-y-1.5">
                                                <label className="block text-xs font-bold text-zinc-300 uppercase tracking-wider">Correo electrónico *</label>
                                                <input type="email" id="sales-email" required className="block w-full px-4 py-2.5 bg-zinc-900 border border-brand-border rounded-xl focus:outline-none focus:ring-2 focus:ring-brand-500 text-sm text-white" placeholder="tu@correo.com" />
                                            </div>
                                            <div className="space-y-1.5">
                                                <label className="block text-xs font-bold text-zinc-300 uppercase tracking-wider">Teléfono / WhatsApp</label>
                                                <input type="tel" id="sales-phone" className="block w-full px-4 py-2.5 bg-zinc-900 border border-brand-border rounded-xl focus:outline-none focus:ring-2 focus:ring-brand-500 text-sm text-white" placeholder="+58 412 1234567" />
                                            </div>
                                        </div>
                                        <div className="space-y-1.5">
                                            <label className="block text-xs font-bold text-zinc-300 uppercase tracking-wider">Tipo de publicidad</label>
                                            <select id="sales-type" className="block w-full px-4 py-2.5 bg-zinc-900 border border-brand-border rounded-xl focus:outline-none focus:ring-2 focus:ring-brand-500 text-sm text-white">
                                                {(() => {
                                                    const stored = (() => { try { return JSON.parse(localStorage.getItem('oscar_estereo_db') || '{}'); } catch(e) { return {}; } })();
                                                    const opts = (stored.salesFormOptions && stored.salesFormOptions.adTypes && stored.salesFormOptions.adTypes.length) ? stored.salesFormOptions.adTypes : [
                                                        { value: 'menciones', label: 'Menciones en cabina' },
                                                        { value: 'banner-slider', label: 'Banner en slider de publicidad' },
                                                        { value: 'spot', label: 'Spot radial pregrabado' },
                                                        { value: 'patrocinio', label: 'Patrocinio de programa' },
                                                        { value: 'transmision', label: 'Transmisión de evento en vivo' },
                                                        { value: 'otro', label: 'Otro' }
                                                    ];
                                                    return opts.map(o => <option key={o.value} value={o.value}>{o.label}</option>);
                                                })()}
                                            </select>
                                        </div>
                                        <div className="space-y-1.5">
                                            <label className="block text-xs font-bold text-zinc-300 uppercase tracking-wider">Presupuesto estimado</label>
                                            <select id="sales-budget" className="block w-full px-4 py-2.5 bg-zinc-900 border border-brand-border rounded-xl focus:outline-none focus:ring-2 focus:ring-brand-500 text-sm text-white">
                                                {(() => {
                                                    const stored = (() => { try { return JSON.parse(localStorage.getItem('oscar_estereo_db') || '{}'); } catch(e) { return {}; } })();
                                                    const opts = (stored.salesFormOptions && stored.salesFormOptions.budgetRanges && stored.salesFormOptions.budgetRanges.length) ? stored.salesFormOptions.budgetRanges : [
                                                        { value: 'menos-100', label: 'Menos de $100 USD' },
                                                        { value: '100-300', label: '$100 - $300 USD' },
                                                        { value: '300-500', label: '$300 - $500 USD' },
                                                        { value: '500-1000', label: '$500 - $1000 USD' },
                                                        { value: 'mas-1000', label: 'Más de $1000 USD' },
                                                        { value: 'consultar', label: 'Prefiero consultar' }
                                                    ];
                                                    return opts.map(o => <option key={o.value} value={o.value}>{o.label}</option>);
                                                })()}
                                            </select>
                                        </div>
                                        <div className="space-y-1.5">
                                            <label className="block text-xs font-bold text-zinc-300 uppercase tracking-wider">Mensaje *</label>
                                            <textarea id="sales-message" required rows="4" className="block w-full px-4 py-2.5 bg-zinc-900 border border-brand-border rounded-xl focus:outline-none focus:ring-2 focus:ring-brand-500 text-sm text-white" placeholder="Cuéntanos sobre tu marca, objetivos de campaña, fechas deseadas, etc."></textarea>
                                        </div>
                                        <div className="pt-2 flex flex-col sm:flex-row gap-3 justify-end">
                                            <button type="button" onClick={() => setShowSalesModal(false)} className="bg-zinc-800 hover:bg-zinc-700 text-zinc-300 text-xs font-bold px-5 py-2.5 rounded-xl transition-all">Cancelar</button>
                                            <button type="submit" id="btn-sales-submit" className="bg-brand-600 hover:bg-brand-700 text-white font-bold text-xs px-6 py-2.5 rounded-xl transition-all flex items-center gap-2">
                                                <i className="fa-solid fa-paper-plane"></i> Enviar Solicitud
                                            </button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        )}

                    {/* Modern Minimalist Footer */}
                    <footer className="bg-zinc-950 border-t border-zinc-900 py-12 mt-auto">
                        <div className="max-w-7xl mx-auto px-4 md:px-8 grid grid-cols-1 md:grid-cols-12 gap-8 items-center">
                            
                            {/* Brand info column */}
                            <div className="md:col-span-5 space-y-4">
                                <div className="flex items-center gap-3">
                                    <div className="w-8 h-8 rounded-full overflow-hidden border border-rose-600">
                                        <img 
                                            src="images/logo_oscar-stereo.png" 
                                            alt="Oscar Estéreo 88.1" 
                                            className="w-full h-full object-cover"
                                            onError={(e) => { e.target.src='https://placehold.co/40x40/222222/e11d48?text=OE' }}
                                        />
                                    </div>
                                    <span className="font-display font-black text-lg tracking-wider text-white">OSCAR <span className="text-rose-600">ESTÉREO</span></span>
                                </div>
                                <p className="text-xs text-zinc-500 max-w-sm">
                                    {footerData.description}
                                </p>
                            </div>

                            {/* Middle Quick Links */}
                            <div className="md:col-span-3">
                                <h4 className="text-xs font-bold uppercase tracking-wider text-zinc-400 mb-3">Estación Digital</h4>
                                <ul className="space-y-2 text-xs text-zinc-500">
                                    <li><a href={nav.footer1Target} onClick={(e) => scrollToSection(e, (nav.footer1Target || '#').replace('#',''))} className="hover:text-rose-500 transition cursor-pointer">{nav.footer1Text}</a></li>
                                    <li><a href={nav.footer2Target} onClick={(e) => scrollToSection(e, (nav.footer2Target || '#').replace('#',''))} className="hover:text-rose-500 transition cursor-pointer">{nav.footer2Text}</a></li>
                                    <li><a href={nav.footer3Url} target="_blank" rel="noopener noreferrer" className="hover:text-emerald-500 transition flex items-center gap-1.5"><i className="fas fa-tv text-emerald-600"></i> {nav.footer3Text}</a></li>
                                    <li><button onClick={() => setShowSettings(true)} className="hover:text-rose-500 transition text-left">Cambiar Servidor Stream</button></li>
                                </ul>
                            </div>

                            {/* Social Engagement contact column */}
                            <div className="md:col-span-4 space-y-4">
                                <h4 className="text-xs font-bold uppercase tracking-wider text-zinc-400">Ponte en contacto directo</h4>
                                <div className="flex flex-wrap gap-2.5">

                                    {/* Whatsapp Link */}
                                    <a
                                        href={social.whatsappUrl}
                                        target="_blank"
                                        rel="noopener noreferrer"
                                        className="bg-[#25D366]/10 hover:bg-[#25D366]/20 border border-[#25D366]/20 text-[#25D366] px-4 py-2 rounded-xl text-xs font-bold transition flex items-center gap-2"
                                    >
                                        <i className="fab fa-whatsapp"></i> WhatsApp
                                    </a>

                                    {/* Instagram Link */}
                                    <a
                                        href={social.instagramUrl}
                                        target="_blank"
                                        rel="noopener noreferrer"
                                        className="bg-rose-600/10 hover:bg-rose-600/20 border border-rose-500/20 text-rose-500 px-4 py-2 rounded-xl text-xs font-bold transition flex items-center gap-2"
                                    >
                                        <i className="fab fa-instagram"></i> Instagram
                                    </a>

                                    {/* TikTok Link */}
                                    <a
                                        href={social.tiktokUrl}
                                        target="_blank"
                                        rel="noopener noreferrer"
                                        className="bg-zinc-700/30 hover:bg-zinc-700/50 border border-zinc-600/30 text-zinc-200 px-4 py-2 rounded-xl text-xs font-bold transition flex items-center gap-2"
                                    >
                                        <i className="fab fa-tiktok"></i> TikTok
                                    </a>

                                    {/* Facebook Link */}
                                    <a
                                        href={social.facebookUrl}
                                        target="_blank"
                                        rel="noopener noreferrer"
                                        className="bg-blue-600/10 hover:bg-blue-600/20 border border-blue-500/30 text-blue-400 px-4 py-2 rounded-xl text-xs font-bold transition flex items-center gap-2"
                                    >
                                        <i className="fab fa-facebook"></i> Facebook
                                    </a>

                                    {/* YouTube Link */}
                                    <a
                                        href={social.youtubeUrl}
                                        target="_blank"
                                        rel="noopener noreferrer"
                                        className="bg-red-600/10 hover:bg-red-600/20 border border-red-500/30 text-red-400 px-4 py-2 rounded-xl text-xs font-bold transition flex items-center gap-2"
                                    >
                                        <i className="fab fa-youtube"></i> YouTube
                                    </a>
                                </div>
                                <div className="text-[10px] text-zinc-600">
                                    Dial: <span className="text-zinc-400">88.1 MHz FM</span> | Quebrada Arriba, Parroquia El Blanco, Lara - Venezuela.
                                </div>
                            </div>
                        </div>

                        {/* Copyright tag */}
                        <div className="max-w-7xl mx-auto px-4 md:px-8 mt-10 pt-6 border-t border-zinc-900 flex flex-col sm:flex-row items-center justify-between gap-4 text-[10px] text-zinc-600">
                            <div className="flex items-center gap-3">
                                <a href="login.html" className="text-zinc-700 hover:text-rose-600 transition-colors" title="Panel de Administración"><i className="fas fa-cog text-[10px]"></i></a>
                                &copy; {new Date().getFullYear()} Oscar Estéreo 88.1 FM. Todos los derechos reservados.
                            </div>
                            <div className="flex items-center gap-4">
                                <span className="hover:text-zinc-400 transition cursor-pointer">Términos de Servicio</span>
                                <span className="hover:text-zinc-400 transition cursor-pointer">Políticas de Privacidad</span>
                            </div>
                        </div>

                        {/* Aliados Comerciales y Créditos */}
                        <div className="max-w-7xl mx-auto px-4 md:px-8 mt-8 pt-6 border-t border-zinc-900">
                            <h4 className="text-[10px] font-bold uppercase tracking-wider text-zinc-500 mb-4 text-center">Aliados y Créditos</h4>
                            <div className="flex flex-col sm:flex-row items-center justify-center gap-4 text-[10px] text-zinc-500">
                                <a href={partners.devUrl} target="_blank" rel="noopener noreferrer" className="hover:text-rose-500 transition flex items-center gap-1.5">
                                    <i className="fas fa-code text-rose-600"></i> Diseño y desarrollo: {partners.devName}
                                </a>
                                <span className="hidden sm:inline text-zinc-700">|</span>
                                <a href={partners.colabUrl} target="_blank" rel="noopener noreferrer" className="hover:text-rose-500 transition flex items-center gap-1.5">
                                    <i className="fas fa-music text-rose-600"></i> Colaboración: {partners.colabName}
                                </a>
                                <span className="hidden sm:inline text-zinc-700">|</span>
                                <a href={partners.allyUrl} target="_blank" rel="noopener noreferrer" className="hover:text-rose-500 transition flex items-center gap-1.5">
                                    <i className="fas fa-microphone text-rose-600"></i> {partners.allyName}
                                </a>
                            </div>
                        </div>

                        {/* Google AdWords - Espacio publicitario reservado */}
                        <div className="max-w-7xl mx-auto px-4 md:px-8 mt-8 pt-6 border-t border-zinc-900">
                            <div className="bg-zinc-900/40 border border-zinc-800/60 rounded-2xl p-6 text-center">
                                <span className="text-[10px] text-zinc-600 uppercase tracking-widest font-semibold block mb-2">Publicidad</span>
                                <div className="min-h-[90px] flex items-center justify-center">
                                    {/* Google AdWords - Coloca tu código de anuncio aquí */}
                                    <p className="text-[10px] text-zinc-600 italic">Espacio reservado para publicidad</p>
                                </div>
                            </div>
                        </div>
                    </footer>

                </div>
            );
        }

        // Render Application
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
